{{- if .Values.setDefaultVirtStorageClass }}
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  name: job-set-default-virt-storageclass
  namespace: {{ .Values.vmNamespace }}
spec:
  template:
    spec:
      containers:
      - image: {{ .Values.job.image }}
        command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          TARGET_SC="{{ .Values.vmDefaults.storageClassName }}"

          check_other_default_virt() {
            local sc annotation
            while IFS= read -r line; do
              sc="${line%%:*}"
              annotation="${line#*:}"
              if [ "$annotation" = "true" ] && [ "$sc" != "$TARGET_SC" ]; then
                echo "ERROR: StorageClass ${sc} already has storageclass.kubevirt.io/is-default-virt-class=true"
                return 1
              fi
            done < <(oc get sc -o jsonpath='{range .items[*]}{.metadata.name}{":"}{.metadata.annotations.storageclass\.kubevirt\.io/is-default-virt-class}{"\n"}{end}')
            return 0
          }

          while true; do
            if ! oc get storageclass "${TARGET_SC}" >/dev/null 2>&1; then
              echo "StorageClass ${TARGET_SC} not found, waiting..."
              sleep 15
              continue
            fi

            if ! check_other_default_virt; then
              exit 1
            fi

            current=$(oc get storageclass "${TARGET_SC}" -o jsonpath='{.metadata.annotations.storageclass\.kubevirt\.io/is-default-virt-class}')
            if [ "${current}" = "true" ]; then
              echo "StorageClass ${TARGET_SC} is already the default virt storage class"
              exit 0
            fi

            oc patch storageclass "${TARGET_SC}" -p '{"metadata":{"annotations":{"storageclass.kubevirt.io/is-default-virt-class":"true"}}}'
            echo "Set ${TARGET_SC} as default virt storage class"
            exit 0
          done
        name: set-default-virt-storageclass
      dnsPolicy: ClusterFirst
      restartPolicy: Never
      serviceAccount: {{ .Values.serviceAccountName }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      terminationGracePeriodSeconds: {{ .Values.jobTerminationGracePeriod }}
{{- end }}
